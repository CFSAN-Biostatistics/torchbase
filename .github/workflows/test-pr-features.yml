name: Feature Tests

on:
  pull_request:
    branches: [ master, main ]
    paths:
      - 'torchbase/**/*.py'
      - 'torchbase/tests/**/*.py'

jobs:
  detect-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history to detect changed files

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev]'

    - name: Detect test files in PR
      id: detect_tests
      run: |
        # Get list of test files changed/added in this PR
        git fetch origin ${{ github.base_ref }}
        TEST_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^torchbase/tests/test_.*\.py$' || true)

        if [ -z "$TEST_FILES" ]; then
          echo "No test files detected in PR"
          echo "test_files=" >> $GITHUB_OUTPUT
          echo "has_tests=false" >> $GITHUB_OUTPUT
        else
          echo "Detected test files:"
          echo "$TEST_FILES"
          # Convert to space-separated list for pytest
          TEST_LIST=$(echo "$TEST_FILES" | tr '\n' ' ')
          echo "test_files=$TEST_LIST" >> $GITHUB_OUTPUT
          echo "has_tests=true" >> $GITHUB_OUTPUT
        fi

    - name: Run feature-specific tests
      if: steps.detect_tests.outputs.has_tests == 'true'
      run: |
        echo "Running tests for: ${{ steps.detect_tests.outputs.test_files }}"
        pytest ${{ steps.detect_tests.outputs.test_files }} -v --tb=short -m "not miniwdl"

    - name: Report test summary
      if: always() && steps.detect_tests.outputs.has_tests == 'true'
      run: |
        echo "### Feature Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Tested files:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.detect_tests.outputs.test_files }}" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Skip message
      if: steps.detect_tests.outputs.has_tests == 'false'
      run: |
        echo "No test files detected in this PR - skipping feature tests"
        echo "### Feature Tests" >> $GITHUB_STEP_SUMMARY
        echo "✓ No test files in PR - nothing to validate" >> $GITHUB_STEP_SUMMARY
